<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web | Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Mi Espacio Digital</h1>
        <p>Conéctate conmigo y conoce mi ubicación</p>
    </header>

    <div class="container">

        <!-- SECCIÓN IMÁGENES -->
        <h2>Galería de Imágenes</h2>
        <section class="galeria">
            <div class="tarjeta-imagen">
                <!-- Reemplaza el src con tus fotos reales -->
                <img src="https://picsum.photos/400/300?random=1" alt="Imagen de ejemplo 1">
                <div class="tarjeta-info">
                    <h3>Proyecto Uno</h3>
                </div>
            </div>
            <div class="tarjeta-imagen">
                <img src="https://picsum.photos/400/300?random=2" alt="Imagen de ejemplo 2">
                <div class="tarjeta-info">
                    <h3>Proyecto Dos</h3>
                </div>
            </div>
            <div class="tarjeta-imagen">
                <img src="https://picsum.photos/400/300?random=3" alt="Imagen de ejemplo 3">
                <div class="tarjeta-info">
                    <h3>Proyecto Tres</h3>
                </div>
            </div>
        </section>

        <!-- SECCIÓN BOTONES -->
        <h2>Nuestras Redes</h2>
        <section class="redes-sociales">
            <!-- Reemplaza los '#' con tus enlaces reales -->
            <a href="#" target="_blank" class="btn-red whatsapp">
                WhatsApp
            </a>
            <a href="#" target="_blank" class="btn-red instagram">
                Instagram
            </a>
            <a href="#" target="_blank" class="btn-red tiktok">
                TikTok
            </a>
        </section>

        <!-- SECCIÓN MAPA -->
        <h2>¿Dónde encontrarnos?</h2>
        <section class="mapa-contenedor">
            <!-- Reemplaza el src del iframe por tu ubicación en Google Maps -->
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509374!2d144.95373531531615!3d-37.81627977975171!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sEnvato!5e0!3m2!1ses!2s!4v1614123456789!5m2!1ses!2s" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </section>

    </div>

</body>
</html>
